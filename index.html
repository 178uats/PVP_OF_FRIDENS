<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP of Friends - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Librerías estables de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon-blue: #00BCD4; --neon-pink: #FF4081; --dark-bg: #0D0D0D; --card-bg: #0a0a0a; --header-bg: #050505; }
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: var(--dark-bg); color: #e0e0e0; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        /* HEADER */
        .main-header { background-color: var(--header-bg); padding: 15px 0; border-bottom: 2px solid var(--neon-pink); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .header-content { display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 1200px; margin: 0 auto; }
        .logo h1 { margin: 0; font-size: 1.5em; color: #fff; text-shadow: 0 0 10px var(--neon-blue); cursor: pointer; }
        .main-nav ul { list-style: none; display: flex; gap: 20px; padding: 0; align-items: center; }
        .main-nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.8em; cursor: pointer; }
        .main-nav a:hover { color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink); }

        /* CONTENEDORES */
        .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 100px 0; }
        .hidden { display: none !important; }
        .section-title { text-align: center; font-size: 2.5em; margin-bottom: 40px; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }

        .hero-banner { height: 50vh; background: linear-gradient(rgba(0,0,0,0.6), var(--dark-bg)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .play-btn { background: var(--neon-pink); color: white; padding: 20px 50px; text-decoration: none; border-radius: 5px; box-shadow: 0 0 20px var(--neon-pink); font-family: 'Orbitron'; font-size: 1.5em; transition: 0.3s; }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--neon-pink); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 30px; border-radius: 15px; border-left: 4px solid var(--neon-blue); position: relative; }
        
        /* CLANES */
        .clan-badge { font-family: 'Orbitron'; font-size: 0.8em; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .clan-dragon { background: #ff4d4d; color: #000; box-shadow: 0 0 8px #ff4d4d; }
        .clan-fenix { background: #00ffff; color: #000; box-shadow: 0 0 8px #00ffff; }
        .clan-espectro { background: #9b59b6; color: #fff; box-shadow: 0 0 8px #9b59b6; }
        .clan-ninguno { background: #444; color: #aaa; }

        /* PERFIL DE USUARIO */
        .user-status-bar { background: #111; border: 1px solid #222; padding: 15px 25px; border-radius: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .clan-selector { background: #000; color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* CLASIFICACIÓN */
        .leaderboard-container { background: var(--card-bg); border: 1px solid #222; border-radius: 15px; overflow: hidden; margin-bottom: 60px; }
        .leaderboard-table { width: 100%; border-collapse: collapse; }
        .leaderboard-table th { background: #111; color: var(--neon-blue); padding: 15px; text-align: left; font-family: 'Orbitron'; }
        .leaderboard-table td { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .row-admin-or { background: rgba(255, 64, 129, 0.08); border-left: 4px solid var(--neon-pink); }

        /* AUTENTICACIÓN */
        .auth-box { max-width: 400px; margin: 120px auto; background: var(--card-bg); border: 1px solid #333; padding: 40px; border-radius: 15px; border-top: 4px solid var(--neon-pink); text-align: center; }
        .auth-box input, .auth-box select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--neon-pink); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; }
        .btn:hover { opacity: 0.9; box-shadow: 0 0 10px var(--neon-pink); }
        .btn-alt { background: transparent; border: 1px solid #444; color: #aaa; margin-top: 15px; }
        .btn-alt:hover { border-color: var(--neon-blue); color: #fff; box-shadow: 0 0 10px var(--neon-blue); }

        /* SALA DE CHAT */
        .chat-container-box { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 25px; border-top: 4px solid var(--neon-pink); display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; background: #050505; border-radius: 8px; margin-bottom: 15px; border: 1px solid #111; }
        .chat-msg { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95em; padding: 6px; border-radius: 6px; }
        .chat-msg:hover { background: #0f0f0f; }
        .chat-msg .content-area { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .chat-msg .user { font-weight: bold; color: var(--neon-blue); }
        .chat-msg .time { font-size: 0.75em; color: #555; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex-grow: 1; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- CABECERA -->
    <header class="main-header hidden" id="site-header">
        <div class="header-content">
            <div class="logo" onclick="showSection('home')"><h1>PVP OF FRIENDS</h1></div>
            <nav class="main-nav">
                <ul>
                    <li><a onclick="showSection('home')">INICIO</a></li>
                    <li><a onclick="showSection('chat')">💬 CHAT EN VIVO</a></li>
                    <li><a onclick="logout()" style="color: #ff4444; margin-left:15px;">SALIR</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ACCESO -->
    <div id="auth-section" class="container">
        <div class="auth-box">
            <h2 id="auth-title" style="color: #fff; font-size: 1.8em;">INGRESAR AL SISTEMA</h2>
            
            <input type="text" id="login-username" placeholder="Tu Nombre de Piloto / Usuario">
            <input type="password" id="login-master-pass" placeholder="Contraseña Admin (Opcional)">
            
            <div id="register-fields" class="hidden">
                <label style="display:block; text-align:left; font-size:0.8em; margin-top:10px; color:#aaa;">SELECCIONA TU CLAN:</label>
                <select id="login-clan">
                    <option value="Ninguno">Sin clan (Neutral)</option>
                    <option value="Dragón">🔴 Clan Dragón</option>
                    <option value="Fénix">🔵 Clan Fénix</option>
                    <option value="Espectro">🟢 Clan Espectro</option>
                </select>
            </div>

            <button class="btn" id="btn-primary-auth" onclick="loginClassic()">INICIAR SESIÓN</button>
            <button class="btn btn-alt" id="btn-toggle-auth" onclick="toggleAuthMode()">¿No tienes cuenta? Registrarse</button>
            <button class="btn btn-alt" style="border-color: var(--neon-pink); color: var(--neon-pink);" onclick="enterAsGuest()">ENTRAR COMO INVITADO 👁️</button>
        </div>
    </div>

    <!-- CONTENIDO GENERAL -->
    <div id="site-content" class="hidden">
        <div id="home-content">
            <section class="hero-banner">
                <h2 style="font-size: 4em; color:white; text-shadow: 0 0 20px var(--neon-blue);">PVP OF FRIENDS</h2>
            </section>
            
            <div class="container">
                <div class="user-status-bar" id="user-profile-bar">
                    <div>👑 Jugador: <span id="bar-username" style="font-weight:bold; color:var(--neon-blue)">-</span></div>
                    <div>Clan: <span id="bar-clan" class="clan-badge clan-ninguno">Ninguno</span></div>
                    <div>Nivel: <span id="bar-level" style="color:gold;">0</span> | Kills: <span id="bar-kills" style="color:#ff4444;">0</span></div>
                </div>

                <h2 class="section-title">TOP CLASIFICACIÓN GLOBAL</h2>
                <div class="leaderboard-container">
                    <table class="leaderboard-table">
                        <thead><tr><th>POS</th><th>PILOTO / CUENTA</th><th>CLAN</th><th>RANGO PVP</th><th>NIVEL</th><th>BAJAS</th></tr></thead>
                        <tbody id="leader-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SCON CHAT -->
        <div id="chat-content" class="container hidden">
            <h2 class="section-title">SALA GLOBAL DE COMBATE</h2>
            <div class="chat-container-box">
                <div class="chat-messages" id="chat-box"></div>
                <div class="chat-input-area" id="chat-write-zone">
                    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                    <button class="btn" style="width: auto; margin:0; padding: 0 25px;" onclick="sendChatMessage()">ENVIAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN OFICIAL COMPLETA PARA EVITAR ERRORES DE INICIALIZACIÓN
        var firebaseConfig = {
            apiKey: "AIzaSyAsFakeKey_JustForStructure", 
            databaseURL: "https://pvp-friends-47018-default-rtdb.firebaseio.com",
            projectId: "pvp-friends-47018"
        };
        
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        var sessionUser = null;
        var isGuest = false;
        var globalUsersList = [];
        var isRegisterMode = false;

        function getClanClass(clan) {
            if(clan === 'Dragón') return 'clan-dragon';
            if(clan === 'Fénix') return 'clan-fenix';
            if(clan === 'Espectro') return 'clan-espectro';
            return 'clan-ninguno';
        }

        window.toggleAuthMode = function() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "REGISTRAR PILOTO NUEVO" : "INGRESAR AL SISTEMA";
            if(isRegisterMode) {
                document.getElementById('register-fields').classList.remove('hidden');
                document.getElementById('btn-primary-auth').innerText = "CREAR CUENTA Y ENTRAR";
                document.getElementById('btn-toggle-auth').innerText = "¿Ya tienes cuenta? Iniciar Sesión";
            } else {
                document.getElementById('register-fields').classList.add('hidden');
                document.getElementById('btn-primary-auth').innerText = "INICIAR SESIÓN";
                document.getElementById('btn-toggle-auth').innerText = "¿No tienes cuenta? Registrarse";
            }
        };

        window.loginClassic = function() {
            var usernameInput = document.getElementById('login-username').value.trim();
            var masterPass = document.getElementById('login-master-pass').value;
            var chosenClan = document.getElementById('login-clan').value;

            if (!usernameInput) { alert("Escribe tu nombre."); return; }
            var lowerUser = usernameInput.toLowerCase();

            if ((lowerUser === 'traco_games' || lowerUser === 'admin') && masterPass !== 'ceibalTG13@') {
                alert("Contraseña de administrador incorrecta.");
                return;
            }

            var existingUser = globalUsersList.find(function(u) { return u.username.toLowerCase() === lowerUser; });

            if (isRegisterMode) {
                if (existingUser) { alert("❌ Ese nombre ya existe."); return; }
                var userKey = 'user_' + Date.now();
                sessionUser = {
                    id: userKey,
                    username: usernameInput,
                    clan: chosenClan,
                    level: lowerUser === 'traco_games' ? 999 : 0,
                    kills: lowerUser === 'traco_games' ? 99999 : 0,
                    isAdmin: lowerUser === 'traco_games'
                };
                db.ref('users/' + userKey).set(sessionUser);
                alert("🎉 ¡Registro Completado!");
            } else {
                if (!existingUser && lowerUser !== 'traco_games') { alert("❌ No encontrado. Regístrate primero."); return; }
                sessionUser = existingUser || { id: 'traco_games_admin', username: 'Traco_Games', clan: 'Ninguno', level: 999, kills: 99999, isAdmin: true };
            }

            isGuest = false;
            launchInterface();
        };

        window.enterAsGuest = function() {
            isGuest = true;
            sessionUser = { username: "Invitado", clan: "Ninguno", level: 0, kills: 0, isAdmin: false };
            launchInterface();
            document.getElementById('chat-write-zone').innerHTML = `<p style="color:#aaa; text-align:center; width:100%;">🔒 Regístrate para chatear.</p>`;
        };

        function launchInterface() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('site-header').classList.remove('hidden');
            document.getElementById('site-content').classList.remove('hidden');
            updateLiveUserBar();
            showSection('home');
        }

        function updateLiveUserBar() {
            if(!sessionUser) return;
            document.getElementById('bar-username').innerText = sessionUser.username;
            document.getElementById('bar-clan').innerText = sessionUser.clan;
            document.getElementById('bar-clan').className = "clan-badge " + getClanClass(sessionUser.clan);
            document.getElementById('bar-level').innerText = sessionUser.level;
            document.getElementById('bar-kills').innerText = sessionUser.kills;
        }

        window.sendChatMessage = function() {
            var input = document.getElementById('chat-input');
            var text = input.value.trim();
            if(!text || isGuest) return;

            db.ref('chat').push({
                user: sessionUser.username,
                text: text
            });
            input.value = '';
        };

        window.logout = function() { location.reload(); };
        
        window.showSection = function(id) {
            document.getElementById('home-content').classList.add('hidden');
            document.getElementById('chat-content').classList.add('hidden');
            document.getElementById(id + '-content').classList.remove('hidden');
        };

        // ESCUCHADORES EN TIEMPO REAL DIRECTOS
        db.ref('users').on('value', function(snapshot) {
            var data = snapshot.val();
            globalUsersList = data ? Object.keys(data).map(function(k) { return {id: k, ...data[k]}; }) : [];
            
            var listElement = document.getElementById('leader-list');
            if(listElement) {
                var sorted = [...globalUsersList].sort(function(a,b) { return (b.kills || 0) - (a.kills || 0); });
                listElement.innerHTML = sorted.map(function(user, i) {
                    return `<tr>
                        <td><strong>#${i + 1}</strong></td>
                        <td>${user.username}</td>
                        <td><span class="clan-badge ${getClanClass(user.clan)}">${user.clan}</span></td>
                        <td>${user.isAdmin ? '⚡ ADMIN' : '🥉 Piloto'}</td>
                        <td>${user.level || 0}</td>
                        <td>${user.kills || 0}</td>
                    </tr>`;
                }).join('');
            }
        });

        db.ref('chat').on('value', function(snapshot) {
            var data = snapshot.val();
            var messages = data ? Object.keys(data).map(function(k) { return data[k]; }) : [];
            var box = document.getElementById('chat-box');
            if(box) {
                box.innerHTML = messages.map(function(m) {
                    return `<div class="chat-msg">
                        <div class="content-area">
                            <span class="user">${m.user}:</span> <span class="text">${m.text}</span>
                        </div>
                    </div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            }
        });
    </script>
</body>
</html>
